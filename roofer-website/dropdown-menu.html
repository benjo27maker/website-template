.menu{
    position: relative;
    z-index: 0;
}

.dropbtn {
    width: 40%;
    height: 15vh;
    padding: 16px;
    border: none;

    background-color: #d2dede;
    border-radius: 5px;

    display: flex;
    justify-content: center;
    align-items: center;

    overflow: visible;
    position: relative;
    z-index: 2;

    cursor: pointer;



}

.dropbtn.active {
    background-color: #b9caca;

    border-bottom-right-radius: 0px;
    border-bottom-left-radius: 0px;
}




.dropbtn .top {
    transition: transform 0.5s ease;
}

.dropbtn.active .top {
    background-color: #b9caca;
    transform: translateY(-20px);
}

.dropbtn .middle {
    transition: opacity 0.5s ease;
}

.dropbtn.active .middle {
    opacity: 0;
}

.dropbtn .bottom {
    transition: transform 0.7s ease;
    
}

.dropbtn.active .bottom {
    transform: translateY(410px);
}




#menu-icon {
    overflow: visible;
    fill: #788080;
    opacity: 0.77;
}




#menu-text {
    font-family: "Telegraf UltraBold";
    font-size: 40px;
    color: #525757;

    position: absolute; 
    top: -3vh;
    left: 5%;;

    opacity: 0;
    transition: opacity 0.5s ease;
    pointer-events: none;
}

#menu-text.show {
    opacity: 1;
    z-index: 2;

}





.dropdown-content {
    background-color: #b9caca;
    font-family: "Telegraf UltraLight";
    font-size: 23px;

    min-width: 40%;
    border-bottom-left-radius: 5px;
    border-bottom-right-radius: 5px;

    position: absolute;
    z-index: 1;
    
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
    transform: translateY(-30px);
    transition: opacity 0.5s ease, transform 0.5s ease, visibility 0.3s;
    
    
    
}

.dropdown-content.show {
  opacity: 1;
  visibility: visible;
  pointer-events: auto;
  transform: translateY(0);
  z-index: 1;
}



.dropdown-content a {
  color: #525757;
  padding: 12px 16px;
  text-decoration: none;
  text-align: center;
  display: block;
  z-index: 1;
}





#ruler-svg {

    fill: #788080;
    top: 0;
    right: 0;
    z-index: 5;
    overflow: visible;

}
